name: bluebuild
on:
  schedule:
    - cron:
        "30 18 * * *"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        gpu: [nvidia, nvidia-legacy, amd-intel]
        steam: [steam, no-steam]
    steps:
      - name: Maximize build space
        uses: jlumbroso/free-disk-space@main
        with: 
         tool-cache: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Fetch Fedora Release
        id: clean_version
        shell: bash
        run: |
          MAX_RETRIES=5
          RETRY_COUNT=0
          SUCCESS=false
          URL="https://fedoraproject.org/releases.json"

          until [ $RETRY_COUNT -ge $MAX_RETRIES ] || [ "$SUCCESS" = true ]; do
            echo "Attempting to fetch Fedora releases (Attempt $((RETRY_COUNT + 1))...)"
            RESPONSE=$(curl -fsSL "$URL" || echo "failed")

            if [ "$RESPONSE" != "failed" ]; then
              VERSION=$(echo "$RESPONSE" | grep -oE '"version": "[0-9]+"' | grep -oE '[0-9]+' | sort -rn | head -n 1)
              if [ -n "$VERSION" ]; then
                echo "stable_one=$VERSION" >> $GITHUB_OUTPUT
                echo "Selected Fedora Version: $VERSION"
                SUCCESS=true
              else
                echo "Connected, but couldn't parse a version number."
              fi
            else
              echo "Connection failed. Waiting 10 seconds..."
              sleep 10
              RETRY_COUNT=$((RETRY_COUNT + 1))
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "Failed to fetch Fedora versions after $MAX_RETRIES attempts."
            exit 1
          fi

      - name: Prepare Recipe
        id: meta
        shell: bash
        run: |
          if [[ "${{ matrix.steam }}" == "steam" ]]; then
            FOLDER="steam"
          else
            FOLDER="variants"
          fi

          FILENAME="shadowos-linux"
          [[ "${{ matrix.gpu }}" != "amd-intel" ]] && FILENAME+="-${{ matrix.gpu }}"
          [[ "${{ matrix.steam }}" == "steam" ]] && FILENAME+="-steam"
          
          SRC_PATH="$FOLDER/$FILENAME.yml"
          
          mkdir -p temp_recipes
          DEST_PATH="temp_recipes/$FILENAME-processed.yml"
          
          FEDORA_VER="${{ steps.clean_version.outputs.stable_one }}"
          sed "s/image-version: .*/image-version: $FEDORA_VER/" "$SRC_PATH" > "$DEST_PATH"
          
          echo "recipe_path=$DEST_PATH" >> $GITHUB_OUTPUT
          echo "Generated recipe at $DEST_PATH with Fedora $FEDORA_VER"

      - name: Build Custom Image
        uses: blue-build/github-action@main
        with:
          recipe: ${{ steps.meta.outputs.recipe_path }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
          build_chunked_oci: true
          max_layers: 127
