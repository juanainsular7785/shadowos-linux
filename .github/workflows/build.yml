name: bluebuild
on:
  schedule:
    - cron:
        "30 18 * * *"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        gpu: [nvidia, nvidia-legacy, amd-intel]
        steam: [steam, no-steam]
    steps:
      - name: Maximize build space
        uses: jlumbroso/free-disk-space@main
        with: 
         tool-cache: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Generate Recipe Path
        id: meta
        shell: bash
        run: |
          if [[ "${{ matrix.steam }}" == "steam" ]]; then
            FOLDER="steam"
          else
            FOLDER="variants"
          fi

          FILENAME="shadowos-linux"
          [[ "${{ matrix.gpu }}" != "amd-intel" ]] && FILENAME+="-${{ matrix.gpu }}"
          [[ "${{ matrix.steam }}" == "steam" ]] && FILENAME+="-steam"
          
          echo "recipe_path=$FOLDER/$FILENAME.yml" >> $GITHUB_OUTPUT

      - name: Build Custom Image
        uses: blue-build/github-action@main
        with:
          recipe: ${{ steps.meta.outputs.recipe_path }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
#         build_chunked_oci: true
