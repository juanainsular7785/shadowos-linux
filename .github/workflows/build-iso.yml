name: Build ISO
on:
  workflow_run:
    workflows: ["bluebuild"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        gpu: [nvidia, nvidia-legacy, amd-intel]
        steam: [steam, no-steam]
        flatpak_status: [flatpaks, no-flatpaks]
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Maximize build space
        uses: jlumbroso/free-disk-space@main
        with:    
          tool-cache: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Generate Metadata
        id: meta
        shell: bash
        run: |
          ISO_NAME="shadowos-linux"
          [[ "${{ matrix.gpu }}" != "amd-intel" ]] && ISO_NAME+="-${{ matrix.gpu }}"
          [[ "${{ matrix.steam }}" != "no-steam" ]] && ISO_NAME+="-${{ matrix.steam }}"
          
          echo "container_image=$ISO_NAME" >> $GITHUB_OUTPUT

          if [[ "${{ matrix.flatpak_status }}" == "no-flatpaks" ]]; then
            ISO_NAME+="-noflatpaks"
          fi
          
          echo "full_iso_name=$ISO_NAME" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Fetch Fedora Release
        id: clean_version
        shell: bash
        run: |
          MAX_RETRIES=5
          RETRY_COUNT=0
          SUCCESS=false
          URL="https://fedoraproject.org/releases.json"

          until [ $RETRY_COUNT -ge $MAX_RETRIES ] || [ "$SUCCESS" = true ]; do
            echo "Attempting to fetch Fedora releases (Attempt $((RETRY_COUNT + 1))...)"
            RESPONSE=$(curl -fsSL "$URL" || echo "failed")

            if [ "$RESPONSE" != "failed" ]; then
              VERSION=$(echo "$RESPONSE" | grep -oE '"version": "[0-9]+"' | grep -oE '[0-9]+' | sort -rn | head -n 1)
              if [ -n "$VERSION" ]; then
                echo "stable_one=$VERSION" >> $GITHUB_OUTPUT
                echo "Selected Fedora Version: $VERSION"
                SUCCESS=true
              else
                echo "Connected, but couldn't parse a version number."
              fi
            else
              echo "Connection failed. Waiting 10 seconds..."
              sleep 10
              RETRY_COUNT=$((RETRY_COUNT + 1))
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "Failed to fetch Fedora versions after $MAX_RETRIES attempts."
            exit 1
          fi

      - name: Resolve Dynamic Flatpak Refs
        id: flatpak_list
        if: ${{ matrix.flatpak_status == 'flatpaks' }}
        shell: bash
        run: |
          BASE_DIR="files/flatpaks"
          REFS_STRING=""

          process_file() {
            local file_path=$1
            if [ -f "$file_path" ]; then
              echo "Processing file: $file_path"
              while IFS= read -r ID || [ -n "$ID" ]; do
                [[ -z "$ID" || "$ID" =~ ^# ]] && continue
                CLEAN_ID=$(echo "$ID" | tr -d '\r' | xargs)
                
                echo "Resolving $CLEAN_ID..."
                FULL_REF=$(curl -s "https://flathub.org/api/v2/appstream/$CLEAN_ID" | jq -r '.bundle.value // empty')
                
                if [ -n "$FULL_REF" ] && [ "$FULL_REF" != "null" ]; then
                    REFS_STRING+="$FULL_REF "
                else
                    echo "Warning: Could not resolve $CLEAN_ID via API. Using stable app fallback."
                    REFS_STRING+="app/$CLEAN_ID/x86_64/stable "
                fi
              done < "$file_path"
            fi
          }

          process_file "$BASE_DIR/app"
          process_file "$BASE_DIR/runtime"

          FINAL_REFS=$(echo "$REFS_STRING" | xargs)
          echo "Generated Refs: $FINAL_REFS"
          echo "refs=$FINAL_REFS" >> $GITHUB_OUTPUT

      - name: Prepare Squashed Image
        shell: bash
        run: |
          docker run -d -p 5000:5000 --name registry registry:2
          podman pull ghcr.io/shadowos-linux/${{ steps.meta.outputs.container_image }}:latest
          CONTAINER=$(podman create ghcr.io/shadowos-linux/${{ steps.meta.outputs.container_image }}:latest)
          podman export $CONTAINER | docker import - localhost:5000/shadowos-squashed:latest
          docker push localhost:5000/shadowos-squashed:latest
          podman rm $CONTAINER

      - name: Build ISO
        uses: jasonn3/build-container-installer@main
        id: iso_build
        with:
          arch: x86_64
          image_name: shadowos-squashed
          image_repo: localhost:5000
          image_tag: latest
          version: ${{ steps.clean_version.outputs.stable_one }}
          variant: cosmic-atomic
          flatpak_remote_refs: ${{ matrix.flatpak_status == 'flatpaks' && steps.flatpak_list.outputs.refs || '' }}
          iso_name: ${{ steps.meta.outputs.full_iso_name }}-f${{ steps.clean_version.outputs.stable_one }}-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}.iso
          
      - name: Upload ISO to Job Artifacts
        uses: actions/upload-artifact@main
        with:
          path: |
            ${{ steps.iso_build.outputs.iso_path }}/${{ steps.meta.outputs.full_iso_name }}-f${{ steps.clean_version.outputs.stable_one }}-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}.iso
            ${{ steps.iso_build.outputs.iso_path }}/${{ steps.meta.outputs.full_iso_name }}-f${{ steps.clean_version.outputs.stable_one }}-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}.iso-CHECKSUM
          name: ${{ steps.meta.outputs.full_iso_name }}-f${{ steps.clean_version.outputs.stable_one }}-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}.zip
          retention-days: 4
          compression-level: 0
