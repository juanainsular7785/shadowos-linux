name: Build ISO
on:
  workflow_run:
    workflows: ["bluebuild"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - shadowos-linux
          - shadowos-linux-nvidia
          - shadowos-linux-steam
          - shadowos-linux-nvidia-steam
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Maximize build space
        uses: jlumbroso/free-disk-space@main
        with:	
          tool-cache: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Generate Metadata
        id: meta
        shell: bash
        run: |
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Fetch Fedora Release
        id: clean_version
        shell: bash
        run: |
          MAX_RETRIES=5
          RETRY_COUNT=0
          SUCCESS=false
          
          URL="https://fedoraproject.org/releases.json"

          until [ $RETRY_COUNT -ge $MAX_RETRIES ] || [ "$SUCCESS" = true ]; do
            echo "Attempting to fetch Fedora releases (Attempt $((RETRY_COUNT + 1))...)"
            
            RESPONSE=$(curl -fsSL "$URL" || echo "failed")

            if [ "$RESPONSE" != "failed" ]; then
              VERSION=$(echo "$RESPONSE" | grep -oE '"version": "[0-9]+"' | grep -oE '[0-9]+' | sort -rn | head -n 1)
              
              if [ -n "$VERSION" ]; then
                echo "stable_one=$VERSION" >> $GITHUB_OUTPUT
                echo "Selected Fedora Version: $VERSION"
                SUCCESS=true
              else
                echo "Connected, but couldn't parse a version number."
              fi
            else
              echo "Connection failed. Waiting 10 seconds..."
              sleep 10
              RETRY_COUNT=$((RETRY_COUNT + 1))
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "Failed to fetch Fedora versions after $MAX_RETRIES attempts."
            exit 1
          fi

      - name: Setup Flatpak for Branch Discovery
        run: |
          sudo apt update && sudo apt install -y flatpak
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Prepare Dynamic Flatpak List
        id: flatpak_list
        shell: bash
        run: |
          BASE_DIR="files/flatpaks"
          REFS_STRING=""

          process_file() {
            local file_path=$1
            local type=$2 # "app" or "runtime"
            
            if [ -f "$file_path" ]; then
              while IFS= read -r ID || [ -n "$ID" ]; do
                [[ -z "$ID" || "$ID" =~ ^# ]] && continue
                CLEAN_ID=$(echo "$ID" | xargs)
                
                LATEST_BRANCH=$(flatpak --user remote-ls flathub --columns=branch --app-runtime $CLEAN_ID 2>/dev/null | sort -V | tail -n 1)
                
                if [ -z "$LATEST_BRANCH" ]; then
                    LATEST_BRANCH="stable"
                fi
                
                REFS_STRING+="$type/$CLEAN_ID/x86_64/$LATEST_BRANCH "
              done < "$file_path"
            fi
          }

          process_file "$BASE_DIR/app" "app"
          process_file "$BASE_DIR/runtime" "runtime"

          echo "refs=$(echo $REFS_STRING | xargs)" >> $GITHUB_OUTPUT

      - name: Build ISO
        uses: jasonn3/build-container-installer@main
        id: iso_build
        with:
          arch: x86_64
          image_name: ${{ matrix.image }}
          image_repo: ghcr.io/shadowos-linux 
          image_tag: latest
          version: ${{ steps.clean_version.outputs.stable_one }}
          variant: cosmic-atomic
          flatpak_remote_refs: ${{ steps.flatpak_list.outputs.refs }}
          iso_name: ${{ matrix.image }}-f${{ steps.clean_version.outputs.stable_one }}-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}.iso
          
      - name: Upload ISO to Job Artifacts
        uses: actions/upload-artifact@main
        with:
          path: |
            ${{ steps.iso_build.outputs.iso_path }}/${{ matrix.image }}-f${{ steps.clean_version.outputs.stable_one }}-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}.iso
            ${{ steps.iso_build.outputs.iso_path }}/${{ matrix.image }}-f${{ steps.clean_version.outputs.stable_one }}-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}.iso-CHECKSUM
          name: ${{ matrix.image }}-f${{ steps.clean_version.outputs.stable_one }}-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.sha_short }}.zip
          retention-days: 4
          compression-level: 0
