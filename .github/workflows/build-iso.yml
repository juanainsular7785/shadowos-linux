name: Build ISO
on:
  workflow_run:
    workflows: ["bluebuild"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        gpu: [nvidia, nvidia-legacy, amd-intel]
        steam: [steam, no-steam]
    permissions:
      contents: read
      packages: read
      id-token: write
      
    steps:
#      - name: Maximize build space
#        uses: jlumbroso/free-disk-space@main
#        with:    
#          tool-cache: true

      - name: Checkout
        uses: actions/checkout@main

      - name: Fetch Fedora Release
        id: clean_version
        shell: bash
        run: |
          MAX_RETRIES=5
          RETRY_COUNT=0
          SUCCESS=false
          URL="https://fedoraproject.org/releases.json"

          until [ $RETRY_COUNT -ge $MAX_RETRIES ] || [ "$SUCCESS" = true ]; do
            echo "Attempting to fetch Fedora releases (Attempt $((RETRY_COUNT + 1))...)"
            RESPONSE=$(curl -fsSL "$URL" || echo "failed")

            if [ "$RESPONSE" != "failed" ]; then
              VERSION=$(echo "$RESPONSE" | grep -oE '"version": "[0-9]+"' | grep -oE '[0-9]+' | sort -rn | head -n 1)
              if [ -n "$VERSION" ]; then
                echo "stable_one=$VERSION" >> $GITHUB_OUTPUT
                echo "Selected Fedora Version: $VERSION"
                SUCCESS=true
              else
                echo "Connected, but couldn't parse a version number."
              fi
            else
              echo "Connection failed. Waiting 10 seconds..."
              sleep 10
              RETRY_COUNT=$((RETRY_COUNT + 1))
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "Failed to fetch Fedora versions after $MAX_RETRIES attempts."
            exit 1
          fi

      - name: Generate Metadata
        id: meta
        shell: bash
        run: |
          IMAGE_NAME="shadowos-linux"
          [[ "${{ matrix.gpu }}" != "amd-intel" ]] && IMAGE_NAME+="-${{ matrix.gpu }}"
          [[ "${{ matrix.steam }}" != "no-steam" ]] && IMAGE_NAME+="-${{ matrix.steam }}"
          echo "container_image=$IMAGE_NAME" >> $GITHUB_OUTPUT

          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Resolve Dynamic Flatpak Refs
        id: flatpak_list
        shell: bash
        run: |
          BASE_DIR="files/flatpaks"
          REFS_STRING=""

          process_file() {
            local file_path=$1
            if [ -f "$file_path" ]; then
              echo "Processing file: $file_path"
              while IFS= read -r ID || [ -n "$ID" ]; do
                [[ -z "$ID" || "$ID" =~ ^# ]] && continue
                CLEAN_ID=$(echo "$ID" | tr -d '\r' | xargs)
                
                echo "Resolving $CLEAN_ID..."
                FULL_REF=$(curl -s "https://flathub.org/api/v2/appstream/$CLEAN_ID" | jq -r '.bundle.value // empty')
                
                if [ -n "$FULL_REF" ] && [ "$FULL_REF" != "null" ]; then
                    REFS_STRING+="$FULL_REF "
                else
                    echo "Warning: Could not resolve $CLEAN_ID via API. Using stable app fallback."
                    REFS_STRING+="app/$CLEAN_ID/x86_64/stable "
                fi
              done < "$file_path"
            fi
          }

          process_file "$BASE_DIR/app"
          process_file "$BASE_DIR/runtime"

          FINAL_REFS=$(echo "$REFS_STRING" | xargs)
          echo "Generated Refs: $FINAL_REFS"
          echo "refs=$FINAL_REFS" >> $GITHUB_OUTPUT

      - name: Build ISO        
        id: iso_build
        uses: ublue-os/titanoboa@main
        with:
          image-ref: ghcr.io/shadowos-linux/${{ steps.meta.outputs.container_image }}:latest
          hook-post-rootfs: files/scripts/post_rootfs.sh
          flatpaks-list: ${{ steps.flatpak_list.outputs.refs }}

      - name: Finalize ISO Name
        id: rename
        shell: bash
        run: |
          VERSION="f${{ steps.clean_version.outputs.stable_one }}"
          BASE_NAME="${{ steps.meta.outputs.container_image }}"
          DATE="${{ steps.meta.outputs.date }}"
          SHA="${{ steps.meta.outputs.sha_short }}"

          FINAL_NAME="${BASE_NAME}-${VERSION}-${DATE}-${SHA}.iso"
          
          mv "${{ steps.iso_build.outputs.iso-dest }}.iso" "$FINAL_NAME"
          sha256sum "$FINAL_NAME" > "$FINAL_NAME-CHECKSUM"
          
          echo "iso_file=$FINAL_NAME" >> $GITHUB_OUTPUT
          echo "checksum_file=$FINAL_NAME-CHECKSUM" >> $GITHUB_OUTPUT

      - name: Upload ISO to Job Artifacts
        uses: actions/upload-artifact@main
        with:
          path: |
            ${{ steps.rename.outputs.iso_file }}
            ${{ steps.rename.outputs.checksum_file }}
          name: ${{ steps.rename.outputs.iso_file }}
          retention-days: 4
          compression-level: 9
