name: shadowos-linux-nvidia-legacy
description: Bazzite Nvidia Legacy with Cosmic DE.
base-image: ghcr.io/ublue-os/bazzite-gnome-nvidia
image-version: stable

modules:
  - from-file: common.yml

  - type: dnf
    remove:
      packages:
        - steam
        
  - type: os-release
    properties:
      VARIANT_ID: shadowos-linux-nvidia-legacy

  - type: script
    scripts:
      - steam.sh
