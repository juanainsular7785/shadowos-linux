---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - ryanabx/cosmic-epoch
        - zeno/scrcpy
    install:
      packages:
        - cosmic-desktop
        - gnome-disk-utility
        - yt-dlp
        - android-tools
        - scrcpy
    remove:
      packages:
        - gnome-control-center-filesystem
        - gnome-app-list
        - gnome-menus
        - gnome-online-accounts-libs
        - gnome-bluetooth-libs
        - gnome-keyring
        - gnome-autoar
        - gnome-keyring-pam
        - gnome-online-accounts
        - gnome-desktop4
        - gnome-settings-daemon
        - gnome-session
        - xdg-desktop-portal-gnome
        - gnome-control-center
        - NetworkManager-ssh-gnome
        - NetworkManager-openconnect-gnome
        - NetworkManager-vpnc-gnome
        - gnome-bluetooth
        - NetworkManager-openvpn-gnome
        - gnome-color-manager
        - gnome-user-share
        - gnome-remote-desktop
        - desktop-backgrounds-gnome
        - gnome-backgrounds
        - gnome-epub-thumbnailer
        - pinentry-gnome3
        - gnome-user-docs
        - fedora-chromium-config-gnome
        - gnome-shell-common
        - steamdeck-gnome-presets
        - gnome-randr-rust
        - gnome-shell
        - ptyxis
        - bazaar
        - malcontent
        - malcontent-control
        - malcontent-ui-libs
        - rygel
        - Sunshine
        - btrfs-assistant
        - epiphany-runtime

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        repo:
          title: Flathub (system)
        install:
          - io.gitlab.librewolf-community
          - eu.betterbird.Betterbird
          - org.onlyoffice.desktopeditors
          - org.qbittorrent.qBittorrent
          - com.github.tchx84.Flatseal
          - io.github.giantpinkrobots.varia
          - io.missioncenter.MissionCenter
          - com.ranfdev.DistroShelf
          - io.github.flattool.Warehouse
          - com.vysp3r.ProtonPlus
          - com.github.Matoking.protontricks
          - com.obsproject.Studio
          - com.obsproject.Studio.Plugin.BackgroundRemoval
          - com.obsproject.Studio.Plugin.Gstreamer
          - com.obsproject.Studio.Plugin.GStreamerVaapi
          - com.obsproject.Studio.Plugin.OBSVkCapture
          - org.freedesktop.Platform.VulkanLayer.OBSVkCapture
          - org.freedesktop.Platform.VulkanLayer.MangoHud
          - org.freedesktop.Platform.VulkanLayer.vkBasalt
      - notify: false
        scope: user
        repo:
          title: Flathub (user)
          
  - type: os-release
    properties:
      NAME: ShadowOS
      PRETTY_NAME: ShadowOS
      ID: shadowos
      RELEASE_TYPE: latest
      DEFAULT_HOSTNAME: shadowos
      HOME_URL: https://shadowelixir.github.io
      DOCUMENTATION_URL: https://github.com/ShadowOS-Linux/shadowos-linux
      SUPPORT_URL: https://github.com/ShadowOS-Linux/shadowos-linux/issues
      BUG_REPORT_URL: https://github.com/ShadowOS-Linux/shadowos-linux/issues
      VARIANT_ID: shadowos-linux
      BOOTLOADER_NAME: ShadowOS Linux

  - type: script
    scripts:
      - bloat.sh

  - type: initramfs

  - type: justfiles
  
  - type: signing
